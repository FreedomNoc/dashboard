<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>NOC Dashboard</title>

<style>

body{
    background:#111;
    color:white;
    font-family:Arial;
    padding:20px;
}

h1{
    margin-bottom:25px;
}

h2{
    margin-top:35px;
    margin-bottom:15px;
}

table{
    width:100%;
    border-collapse:collapse;
    font-size:14px;
    margin-bottom:35px;
}

th{
    background:#222;
    color:white;
    padding:10px;
    border:1px solid #333;
}

td{
    padding:10px;
    border:1px solid #333;
}

tr:nth-child(even){
    background:#1a1a1a;
}

.Resolved{
    color:lime;
    font-weight:bold;
}

.Problem{
    color:red;
    font-weight:bold;
}

.Draft{
    color:orange;
    font-weight:bold;
}

</style>

</head>

<body>

<h1>NOC Dashboard</h1>

<h2 style="color:#ff4d4d;">🔴 Критичные аварии</h2>

<table id="dashboard"></table>

<h2 style="color:#66ff66;">🟢 Плановые работы</h2>

<table id="maintenance"></table>

<script>

function loadTable(file,id){

fetch(file + "?v=" + new Date().getTime())

.then(response=>response.text())

.then(data=>{

    const rows=data.trim().split('\n');

    let html='';

    rows.forEach((row,index)=>{

        const cols=row.split(';');

        html+="<tr>";

        cols.forEach((col,i)=>{

            col=col.replace(/"/g,'');

            if(index===0){

                html+=`<th>${col}</th>`;

            }else{

                if(i===1){

                    html+=`<td class="${col}">${col}</td>`;

                }else{

                    html+=`<td>${col}</td>`;

                }

            }

        });

        html+="</tr>";

    });

    document.getElementById(id).innerHTML=html;

})

.catch(error=>{

    document.getElementById(id).innerHTML=
    "<tr><td style='padding:15px;color:red;'>Не удалось загрузить "+file+"</td></tr>";

    console.error(error);

});

}

loadTable("data.csv","dashboard");

loadTable("maintenance.csv","maintenance");

</script>

</body>
</html>
